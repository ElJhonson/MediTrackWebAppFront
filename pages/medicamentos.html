<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Medicación | Medicinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/medicamentos/index.css">
</head>

<body class="dashboard-body">

    <header class="main-header">
        <div class="logo">Panel de Medicación</div>
        <nav class="nav-links">
            <a href="dashboard-paciente.html">Inicio</a>
            <a href="medicamentos.html" class="active">Medicinas</a>
            <a href="#">Reportes</a>
        </nav>
        <div class="account-menu" id="accountMenuWrap">
            <button
                class="account-menu-btn"
                id="accountMenuBtn"
                type="button"
                aria-haspopup="menu"
                aria-expanded="false"
            >
                <span class="account-avatar" id="meds-user-avatar" aria-hidden="true"></span>
                <span id="meds-user-name"></span>
                <svg class="account-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="account-dropdown" id="accountDropdown" role="menu">
                <button class="logout-menu-item" id="btnLogout" type="button" role="menuitem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Cerrar sesion</span>
                </button>
            </div>
        </div>
    </header>

    <main class="grid-layout">

        <aside class="sidebar">
            <div class="glass-card patient-card">
                <div class="profile-header">
                    <img id="pacienteAvatar" src="https://ui-avatars.com/api/?name=--&background=0D8ABC&color=fff"
                        alt="Avatar">

                    <h3 id="pacienteNombre">---</h3>
                    <p id="pacienteCuidador">---</p>
                </div>
                <div class="stat">
                    <span>Edad</span>
                    <strong id="pacienteEdad">--</strong>
                </div>
            </div>
        </aside>


        <section class="content-area">
            <div class="section-title">
                <h2>Mis Medicamentos</h2>
                <p>Gestiona tus dosis y recordatorios activos.</p>
            </div>
            <div class="elderly-controls">
                <div class="filter-tabs">
                    <button class="btn-add-main btn-add-inline" id="btnOpenModal" 
                    type="button">+ Nueva Medicina</button>
                </div>
            </div>
            <div class="med-grid" id="medContainer">
            </div>
        </section>

    </main>

    <!-- Modal para registrar o actalizar medicinas -->

    <div class="modal-overlay" id="modalMed">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Registrar Medicina</h3>
                <button class="close-btn" id="btnCloseModal">&times;</button>
            </div>
            <form id="medForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="name" placeholder="Ej. Paracetamol" required>
                </div>
                <div class="form-group">
                    <label>Forma Farmacéutica</label>
                    <select id="dosageForm">
                        <option value="Tableta">Tableta</option>
                        <option value="Cápsula">Cápsula</option>
                        <option value="Jarabe">Jarabe</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expiración</label>
                    <input type="date" id="expirationDate" required>
                </div>
                <button type="submit" class="btn-save">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <!-- Modal para registrar alarma de la medicina -->
    <div class="modal-overlay" id="modalAlarma">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3>⏰ Configurar Alarma</h3>
                <button class="close-btn" id="btnCloseAlarma">&times;</button>
            </div>
            <form id="alarmaForm">
                <input type="hidden" id="alarmaMedicinaId">

                <div class="form-group">
                    <label>Fecha y Hora de Inicio</label>
                    <input type="datetime-local" id="fechaInicio" required>
                </div>
                <div class="form-group">
                    <label>Fecha y Hora de Fin</label>
                    <input type="datetime-local" id="fechaFin" required>
                </div>
                <div class="form-group">
                    <label>Frecuencia (cada cuántas horas)</label>
                    <input type="number" id="frecuenciaHoras" min="1" max="168" placeholder="Ej. 8" required>
                </div>
                <button type="submit" class="btn-save">Establecer Recordatorio</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalDeleteConfirm">
        <div class="glass-card modal-content modal-confirm-content" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
            <div class="modal-header">
                <h3 id="deleteConfirmTitle">Confirmar eliminacion</h3>
                <button class="close-btn" id="btnCloseDeleteConfirm" type="button" aria-label="Cerrar confirmacion">&times;</button>
            </div>
            <p class="confirm-message">Esta accion eliminara la medicina seleccionada. ¿Deseas continuar?</p>
            <div class="confirm-actions">
                <button class="btn-cancel" id="btnCancelDelete" type="button">Cancelar</button>
                <button class="btn-danger" id="btnConfirmDelete" type="button">Eliminar</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/paciente-medicinas.page.js"></script>
</body>

</html>
