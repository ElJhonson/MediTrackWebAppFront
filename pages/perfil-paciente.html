<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - MediTrack</title>
    <link rel="stylesheet" href="../styles/perfil-paciente/index.css">
</head>

<body>
    <div class="container">
        <h1 class="main-title">Mi Perfil</h1>

        <div id="loading" class="loading-state">Cargando perfil...</div>

        <main id="profile-card" class="profile-card hidden">
            <div class="profile-header">
                <div class="avatar-large" id="patientAvatar"></div>
                <h2 id="patientName" class="patient-name"></h2>

                <button id="edit-btn" class="btn-edit-outline" type="button">Editar Perfil</button>
            </div>

            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" disabled required>
                    </div>
                    <div class="form-group">
                        <label>Edad</label>
                        <input type="number" id="edad" name="edad" disabled required min="0" max="150">
                    </div>
                    <div class="form-group">
                        <label>CURP (Privado)</label>
                        <div class="phone-input-wrapper">
                            <input type="password" id="curp" disabled maxlength="18">
                            <button type="button" id="toggle-curp" class="btn-toggle-eye">Ver</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Teléfono (Privado)</label>
                        <div class="phone-input-wrapper">
                            <input type="password" id="phoneNumber" disabled class="readonly-field">
                            <button type="button" id="toggle-phone" class="btn-toggle-eye">Ver</button>
                        </div>
                    </div>
                </div>

                <div class="diseases-section">
                    <label class="section-label">Enfermedades Crónicas</label>
                    <div id="diseases-container" class="tags-container">
                    </div>

                    <div id="add-disease-box" class="add-tag-box hidden">
                        <input type="text" id="new-disease-input" placeholder="Agregar enfermedad...">
                        <button type="button" class="btn-add-tag">Agregar</button>
                    </div>
                </div>

                <div id="actions-bar" class="footer-actions hidden">
                    <button type="button" id="btn-cancel" class="btn-cancel-flat">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn-save-main">Guardar Cambios</button>
                </div>
            </form>
        </main>
    </div>

    <!-- Modal de Re-autenticación -->
    <div class="reauth-modal hidden" id="reauthModal" aria-hidden="true">
        <div class="reauth-dialog" role="dialog" aria-modal="true" aria-labelledby="reauthTitle">
            <h3 class="reauth-title" id="reauthTitle">Debes iniciar sesión nuevamente</h3>
            <p class="reauth-text">
                Si cambias el teléfono y guardas, tendrás que iniciar sesión nuevamente. ¿Deseas continuar?
            </p>
            <div class="reauth-actions">
                <button class="btn-cancel-flat" id="btnCancelReauth" type="button">Cancelar</button>
                <button class="btn-save-main" id="btnContinueReauth" type="button">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/perfil-paciente.page.js"></script>
</body>

</html>
