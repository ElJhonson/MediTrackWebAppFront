<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack | Perfil del Cuidador</title>
    <link rel="stylesheet" href="../styles/perfil-cuidador/index.css">
</head>

<body class="perfil-cuidador-page">
    <header class="topbar">
        <div class="topbar-title">
            <h1>Perfil del Cuidador</h1>
            <p class="status" id="profileStatus"></p>
        </div>

        <nav class="nav-links" aria-label="Navegación principal">
            <a href="/pages/dashboard-cuidador.html">Inicio</a>
            <a href="/pages/perfil-cuidador.html" class="active" aria-current="page">Ver Perfil</a>
            <a href="/pages/cuidador-medicinas.html">Medicinas</a>
        </nav>

        <div class="account-menu" id="accountMenuWrap">
            <button class="account-menu-btn" id="accountMenuBtn" type="button" aria-haspopup="menu" aria-expanded="false">
                <span class="account-avatar" id="topbarCaregiverAvatar" aria-hidden="true">--</span>
                <span id="topbarCaregiverName">Cuidador</span>
                <svg class="account-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="account-dropdown" role="menu">
                <button class="logout-menu-item" id="btnLogout" type="button" role="menuitem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Cerrar sesion</span>
                </button>
            </div>
        </div>
    </header>

    <main class="perfil-main">
        <section class="profile-grid">
            <article class="panel identity-card">
                <div class="avatar" id="caregiverAvatar">--</div>
                <h2 class="identity-name" id="caregiverName">Cargando...</h2>
                <p class="identity-role">Cuidador</p>
            </article>

            <article class="panel info-card">
                <div class="info-header">
                    <h3 class="info-title">Datos generales</h3>
                    <button class="btn-edit-outline" id="btnEditProfile" type="button">Editar Perfil</button>
                </div>

                <form id="caregiverProfileForm">
                    <div class="info-grid">
                        <div class="info-item">
                            <label class="info-label" for="inputName">Nombre completo</label>
                            <input class="info-input" id="inputName" type="text" maxlength="80" required disabled>
                        </div>

                        <div class="info-item">
                            <label class="info-label" for="inputPhone">Teléfono</label>
                            <input
                                class="info-input"
                                id="inputPhone"
                                type="text"
                                inputmode="numeric"
                                maxlength="10"
                                autocomplete="tel-national"
                                required
                                disabled
                            >
                        </div>

                        <div class="info-item">
                            <label class="info-label" for="inputOcupacion">Ocupación</label>
                            <input class="info-input" id="inputOcupacion" type="text" maxlength="80" disabled>
                        </div>

                        <div class="info-item">
                            <p class="info-label">Código de vinculación</p>
                            <p class="info-value" id="infoCodigo">--</p>
                        </div>

                        <div class="info-item">
                            <p class="info-label">Pacientes vinculados</p>
                            <p class="info-value" id="infoPacientes">0</p>
                        </div>
                    </div>

                    <div class="form-actions hidden" id="profileActions">
                        <button class="btn-cancel-flat" id="btnCancelProfile" type="button">Cancelar</button>
                        <button class="btn-save-main" id="btnSaveProfile" type="submit">Guardar Cambios</button>
                    </div>
                </form>
            </article>
        </section>
    </main>

    <div class="reauth-modal hidden" id="reauthModal" aria-hidden="true">
        <div class="reauth-dialog" role="dialog" aria-modal="true" aria-labelledby="reauthTitle">
            <h3 class="reauth-title" id="reauthTitle">Debes iniciar sesión nuevamente</h3>
            <p class="reauth-text">
                Si cambias el teléfono y guardas, tendrás que iniciar sesión nuevamente. ¿Deseas continuar?
            </p>
            <div class="reauth-actions">
                <button class="btn-cancel-flat" id="btnCancelReauth" type="button">Cancelar</button>
                <button class="btn-save-main" id="btnContinueReauth" type="button">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/perfil-cuidador.page.js"></script>
</body>

</html>
