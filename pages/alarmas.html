<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrack — Recordatorios</title>
  <link rel="stylesheet" href="../styles/alarmas/index.css" />
</head>
<body>

  <!-- ── Topbar ── -->
  <header class="topbar">
    <div>
      <div class="topbar-title">Recordatorios de tomas</div>
      <div class="topbar-sub">Configura y administra tus alarmas de medicamentos</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-icon" title="Notificaciones">
        <div class="badge-notif"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="btn-icon" title="Configuración">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Contenido principal ── -->
  <div class="content">

    <!-- Tarjetas de estadísticas -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Alarmas activas</div>
        <div class="stat-value" id="statActive">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#84cc16"></span>En curso</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="barActive" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tomas hoy</div>
        <div class="stat-value" id="statToday">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#007bff"></span>Programadas</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="barToday" style="width:0%;background:#007bff"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Próxima alarma</div>
        <div class="stat-value" id="statNext" style="font-size:18px;padding-top:4px">—</div>
        <div class="stat-sub" id="statNextMed">Sin alarmas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Medicamentos</div>
        <div class="stat-value" id="statMeds">5</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#84cc16"></span>Registrados</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:100%"></div></div>
      </div>
    </div>

    <!-- Lista de recordatorios -->
    <div class="two-col">

      <!-- Lista de recordatorios -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#1f3d32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div style="flex:1">
            <div class="card-header-title">Mis recordatorios</div>
            <div class="card-header-sub">Haz clic en una tarjeta para ver el detalle</div>
          </div>
        </div>
        <div class="card-body">

          <div class="filters-row">
            <div class="tabs">
              <button class="tab-btn active" data-filter="all">Todos</button>
              <button class="tab-btn" data-filter="active">Activos</button>
              <button class="tab-btn" data-filter="paused">Pausados</button>
            </div>
            <div class="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="searchInput" placeholder="Buscar medicamento..." />
            </div>
          </div>

          <div class="alarm-list" id="alarmList"></div>

        </div>
      </div>

    </div>
  </div>

  <!-- Toast de notificación -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toastMsg">Alarma creada exitosamente</span>
  </div>

  <script type="module" src="../js/pages/alarmas.page.js"></script>
</body>
</html>
