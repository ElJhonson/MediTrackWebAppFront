<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MediTrack | Panel del Cuidador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/dashboard-cuidador/index.css">
</head>

<body>

        <header class="topbar">
        <div class="user-info">
            <h1>Panel de Supervisión</h1>
        </div>

        <div class="topbar-actions">
            <div class="link-code-container">
                <p class="code-label">Tu codigo de vinculacion</p>
                <div class="code-box">
                    <span class="code-badge" id="link-code"></span>
                    <button class="copy-btn" id="btnCopy" title="Copiar codigo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
                <p class="code-helper">Comparte este codigo con tu paciente para vincular sus cuentas.</p>
            </div>

            <div class="account-menu" id="accountMenuWrap">
                <button class="account-menu-btn" id="accountMenuBtn" type="button" aria-haspopup="menu" aria-expanded="false">
                    <span class="account-avatar" id="caregiver-avatar" aria-hidden="true"></span>
                    <span id="caregiver-name"></span>
                    <svg class="account-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>

                <div class="account-dropdown" id="accountDropdown" role="menu">
                    <button class="logout-menu-item" id="btnLogout" type="button" role="menuitem">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Cerrar sesion</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard">


        <div class="caregiver-grid">

            <section class="patient-list">

                <div class="card-header">
                    <h3 id="patient-count">Pacientes Asignados (0)</h3>
                    <button class="btn-add-patient">Registrar Nuevo Paciente</button>
                </div>

                <div id="patient-list-container"></div>

            </section>


            <aside class="sidebar-stats">
                <div class="service-card schedules">
                    <div class="icon">📅</div>
                    <h3>Calendario Global</h3>
                    <p>Ver todas las citas</p>
                </div>

                <div class="service-card history">
                    <div class="icon">📊</div>
                    <h3>Reportes Médicos</h3>
                    <p>Exportar PDF semanal</p>
                </div>
            </aside>

        </div>

    </main>


    <div id="modalRegister" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="btnCloseModal">&times;</button>

            <div class="modal-layout">
                <div class="modal-illustration">
                    <img src="../assets/img/registro-paciente.png" alt="Registro">
                </div>

                <div class="modal-form-side">
                    <header class="form-header">
                        <span class="badge badge-paciente">Nuevo Paciente</span>
                        <h1>Registrar</h1>
                        <p>Crea una cuenta para tu paciente supervisado.</p>
                    </header>

                    <form id="registerPacienteForm">
                        <div class="input-group">
                            <input type="text" id="name" name="name" placeholder="Nombre completo" required>
                        </div>
                        <div class="input-group">
                            <input type="text" id="phoneNumber" name="phoneNumber" placeholder="Número de teléfono"
                                inputmode="numeric" maxlength="10"
                                autocomplete="tel-national" required>
                        </div>
                        <div class="input-group">
                            <input type="number" id="edad" name="edad" placeholder="Edad" min="0" max="120" required>
                        </div>
                        <div class="input-group password-group">
                            <input type="password" id="password" name="password" placeholder="Contraseña temporal"
                                required>
                            <button type="button" class="toggle-password" id="togglePasswordBtn">
                                <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <svg class="icon-unlock" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 9.2 1"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="input-group password-group">
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                placeholder="Confirmar contraseña temporal" required>
                            <button type="button" class="toggle-password" id="toggleConfirmPasswordBtn">
                                <svg class="icon-lock" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <svg class="icon-unlock" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 9.2 1"></path>
                                </svg>
                            </button>
                        </div>
                        <button type="submit" class="btn-primary">Registrar Paciente</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/dashboard-cuidador.page.js"></script>

</body>


</html>
